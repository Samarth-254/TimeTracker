<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Add Tailwind CDN before any other scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configure Tailwind with your custom settings -->
    <script>
      tailwind.config = {
        darkMode: ["class"],
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Helvetica Neue", "Arial", "sans-serif"],
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            colors: {
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              chart: {
                "1": "hsl(var(--chart-1))",
                "2": "hsl(var(--chart-2))",
                "3": "hsl(var(--chart-3))",
                "4": "hsl(var(--chart-4))",
                "5": "hsl(var(--chart-5))",
              },
              sidebar: {
                DEFAULT: "hsl(var(--sidebar-background))",
                foreground: "hsl(var(--sidebar-foreground))",
                primary: "hsl(var(--sidebar-primary))",
                "primary-foreground": "hsl(var(--sidebar-primary-foreground))",
                accent: "hsl(var(--sidebar-accent))",
                "accent-foreground": "hsl(var(--sidebar-accent-foreground))",
                border: "hsl(var(--sidebar-border))",
                ring: "hsl(var(--sidebar-ring))",
              },
            },
            keyframes: {
              "accordion-down": {
                from: { height: "0" },
                to: { height: "var(--radix-accordion-content-height)" },
              },
              "accordion-up": {
                from: { height: "var(--radix-accordion-content-height)" },
                to: { height: "0" },
              },
            },
            animation: {
              "accordion-down": "accordion-down 0.2s ease-out",
              "accordion-up": "accordion-up 0.2s ease-out",
            },
          },
        },
      };
    </script>
    
    <!-- Updated CSS variables for dark theme -->
    <style>
      :root {
        /* Dark theme colors with pure black background */
        --background: 0 0% 0%;
        --foreground: 0 0% 95%;
        
        --card: 0 0% 5%;
        --card-foreground: 0 0% 95%;
        
        --popover: 0 0% 3%;
        --popover-foreground: 0 0% 95%;
        
        --primary: 221 70% 55%;
        --primary-foreground: 0 0% 98%;
        
        --secondary: 0 0% 10%;
        --secondary-foreground: 0 0% 90%;
        
        --muted: 0 0% 8%;
        --muted-foreground: 220 10% 70%;
        
        --accent: 0 0% 10%;
        --accent-foreground: 0 0% 90%;
        
        --destructive: 0 70% 50%;
        --destructive-foreground: 0 0% 98%;
        
        --border: 0 0% 15%;
        --input: 0 0% 10%;
        --ring: 221 70% 55%;
        
        --radius: 0.5rem;

        /* Chart colors */
        --chart-1: 221 70% 55%;
        --chart-2: 155 70% 50%;
        --chart-3: 45 93% 47%;
        --chart-4: 322 80% 58%;
        --chart-5: 280 60% 52%;
      }
      
      body {
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
      }

      /* Additional styles for the timekeeper app */
      .app-container {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 240px;
        background-color: hsl(0 0% 2%);
        border-right: 1px solid hsl(var(--border));
        padding: 1rem;
      }

      .sidebar-link {
        display: flex;
        align-items: center;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        margin-bottom: 0.5rem;
        color: hsl(var(--foreground));
        text-decoration: none;
      }

      .sidebar-link.active {
        background-color: hsl(0 0% 10%);
      }

      .sidebar-link:hover:not(.active) {
        background-color: hsl(0 0% 5%);
      }

      .main-content {
        flex: 1;
        padding: 1.5rem;
      }

      .card {
        background-color: hsl(var(--card));
        border-radius: var(--radius);
        padding: 1.25rem;
        border: 1px solid hsl(var(--border));
        margin-bottom: 1rem;
      }

      .button-primary {
        background-color: #b91c1c;
        color: white;
        border-radius: var(--radius);
        padding: 0.5rem 1rem;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .button-outline {
        background-color: transparent;
        color: hsl(var(--foreground));
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        padding: 0.5rem 1rem;
        font-weight: 500;
      }

      .stat-card {
        background-color: hsl(var(--card));
        border-radius: var(--radius);
        padding: 1rem;
        border: 1px solid hsl(var(--border));
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
